# Sieger CV — nginx reverse proxy
# Place at: /etc/nginx/sites-available/sieger
# Symlink: ln -s /etc/nginx/sites-available/sieger /etc/nginx/sites-enabled/sieger

server {
    listen 80;
    server_name _;

    # CV API (FastAPI + socket.io)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Socket.io (inspection service — long-lived connections)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # HMI static files (React build)
    location / {
        root /opt/sieger/sieger-ghcl-hmi/dist;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
